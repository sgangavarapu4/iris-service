apiVersion: batch/v1
kind: Job
metadata:
  name: vertex-trigger-test
spec:
  template:
    spec:
      containers:
      - name: gcloud-trigger
        image: google/cloud-sdk:slim
        command: ["gcloud", "ai", "custom-jobs", "create", "--display-name=ArgoTest", "--region=us-central1", "--worker-pool-spec=machine-type=n1-standard-4,container-image-uri=alpine"]
      restartPolicy: Never